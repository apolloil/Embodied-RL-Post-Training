# =============================================================================
# 3. Agent Settings (Agent / Networks)
# =============================================================================
agent:

  repr_dim: 512  # Output dim of the representation module; also the GPT input dim

  vision_encoder:
    pretrained: false
    freeze: false

  gpt:
    output_dim: 512
    n_layer: 8
    n_head: 8
    n_embd: 512    
    block_size: 65    
    dropout: 0.05

  action_chunking:  
    num_queries: 1   
    num_exec: 1

  actor:
    hidden_size: 256  
    num_layers: 2
    log_std_min: -20
    log_std_max: 2
    
  # [Added] Critic configuration (for RL stage)
  # Note: actual critic hyperparams are under train.rl.critic

# =============================================================================
# 4. Training & Evaluation Settings
# =============================================================================
train:
  batch_size: 256 
  num_workers: 4
  use_tb: true
  
  optimizer:
    lr: 1e-4 
    weight_decay: 1e-4

  # Imitation learning stage
  bc:
    num_steps: 601000  
    log_freq: 1000
    eval_freq: 50000
    num_eval_episodes: 10
    save_freq: 200000
    
  rl:
    # --- Snapshot loading ---
    use_rl_snapshot: false
    rl_snapshot: null              # Set from CLI for fine-tuning, e.g. train.rl.rl_snapshot=/path/to/snapshot.pt
    encoder_freeze: false            # Whether to freeze the vision encoder during RL training
    # --- Experiment Control ---
    num_rolls: 100000             # Total interaction rolls (each roll re-makes envs to avoid OpenGL context conflicts)
    num_offline_steps: 601000     # Total offline training steps (for OFF_* scripts)
    num_eval_episodes: 10         # Episodes per task during offline evaluation (BRC default: 10)
    
    # --- Data & Buffer ---
    batch_size: 256               # Batch size
    
    # --- Optimization (Updates per Data) ---
    UTD: 3                        # UTD (Updates-To-Data): gradient updates per interaction step (BRC default: 2)
    
    # --- BRC / SAC Hyperparameters ---
    discount: 0.97                # Gamma
    tau: 0.005                    # Soft update coefficient
    init_temperature: 0.1      # Initial Alpha
    target_entropy: null          # null means auto-set to -dim (note: dim = chunk_size * act_dim)
    
    optimizer:
      lr_actor: 3e-4              # BRC Default
      lr_critic: 3e-4             # BRC Default
      lr_temp: 3e-4               # BRC Default
      weight_decay: 0          # Weight Decay
      
    # --- Distributional Critic (C51) ---
    critic:
      # BRC (Bigger Regularized Categorical) core parameters
      # Note: BRC uses a very wide Critic (4096)
      # hidden_dim: 4096       
      hidden_dim: 1024 
      depth: 2                 
      ensemble_size: 2            # Double Q-Learning
      num_bins: 101               # C51 atom count
      v_min: 0.0                  # Value distribution lower bound (MetaWorld rewards are always positive)
      v_max: 20.0                 # Value distribution upper bound

eval:
  num_eval_episodes: 10
  snapshot_path: null            # Set from CLI when evaluating, e.g. eval.snapshot_path=/path/to/snapshot.pt
# =============================================================================
# 5. Dataset Settings (Data)
# =============================================================================
data:
  root_dir: "./datasets"
  num_demos_per_task: 50

# =============================================================================
# 6. Hydra System Configuration
# =============================================================================
hydra:
  run:
    dir: ${work_dir}
  sweep:
    dir: ${work_dir}_sweep
    subdir: ${hydra.job.num}
